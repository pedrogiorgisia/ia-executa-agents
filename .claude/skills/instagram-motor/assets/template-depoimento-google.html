<!--
TEMPLATE — Depoimento estilo "Avaliação Google" (Prova Social)
==============================================================
Formato visual alternativo pro pilar prova_social. NÃO usa foto da IA —
é um card de review nativo, reconhecível, que gera confiança.

Placeholders substituídos em runtime:
  __AUTHOR__     — nome do cliente (ex: "Marina Albuquerque")
  __INITIAL__    — 1ª letra do nome (avatar)
  __AVATAR_BG__  — cor do avatar (ex: "#1a73e8")
  __DATE__       — quando (ex: "há 2 semanas")
  __REVIEW__     — texto do depoimento (pode ter <b> em palavras-chave)

Saída: 1080×1080 (device_scale_factor=2).
-->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1080px; height: 1350px; position: relative; overflow: hidden;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(150deg, #01051C 0%, #101957 60%, #222D7D 100%);
  display: flex; align-items: center; justify-content: center;
}
/* brilho suave de fundo */
body::before {
  content: ""; position: absolute; width: 700px; height: 700px; border-radius: 50%;
  top: -180px; right: -160px; background: radial-gradient(circle, rgba(255,255,255,.10), transparent 70%);
}
.brand-top {
  position: absolute; top: 54px; left: 0; right: 0; text-align: center;
  color: #fff; font-weight: 600; font-size: 24px; letter-spacing: .32em; opacity: .92;
}
.card {
  width: 880px; background: #fff; border-radius: 32px; padding: 64px 64px 58px;
  box-shadow: 0 40px 90px rgba(0,0,0,.35); position: relative;
}
.grow { display: flex; align-items: center; gap: 14px; margin-bottom: 38px; }
.glogo { font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
.glogo .b{color:#4285F4}.glogo .r{color:#EA4335}.glogo .y{color:#FBBC05}.glogo .g{color:#34A853}
.verified { margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
  color: #1a73e8; font-size: 16px; font-weight: 600; }
.verified svg{width:20px;height:20px}
.head { display: flex; align-items: center; gap: 20px; margin-bottom: 26px; }
.avatar { width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center; color: #fff; font-size: 34px; font-weight: 700; background: __AVATAR_BG__; }
.who { display: flex; flex-direction: column; gap: 3px; }
.name { font-size: 27px; font-weight: 700; color: #202124; }
.meta { font-size: 17px; color: #70757a; font-weight: 500; }
.stars { display: flex; gap: 5px; margin-bottom: 28px; }
.stars svg { width: 38px; height: 38px; }
.review { font-size: 30px; line-height: 1.5; color: #3c4043; font-weight: 500; }
.review b { font-weight: 800; color: #202124; }
.place { margin-top: 36px; padding-top: 26px; border-top: 1px solid #eceff1;
  display: flex; align-items: center; gap: 12px; font-size: 19px; color: #5f6368; font-weight: 600; }
.place svg{width:22px;height:22px;fill:#EA4335}
.handle { position: absolute; bottom: 50px; left: 0; right: 0; text-align: center;
  color: rgba(255,255,255,.85); font-weight: 700; font-size: 19px; letter-spacing: .06em; }
</style>
</head>
<body>
  <div class="brand-top">PP TRAVEL</div>
  <div class="card">
    <div class="grow">
      <span class="glogo"><span class="b">G</span><span class="r">o</span><span class="y">o</span><span class="b">g</span><span class="g">l</span><span class="r">e</span></span>
      <span class="verified">
        <svg viewBox="0 0 24 24" fill="#1a73e8"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L3.2 7.7l5.4-.8z" opacity="0"/><circle cx="12" cy="12" r="10"/><path d="M10.5 15.2l-3-3 1.4-1.4 1.6 1.6 4-4L16 9.8z" fill="#fff"/></svg>
        Avaliação verificada
      </span>
    </div>
    <div class="head">
      <div class="avatar">__INITIAL__</div>
      <div class="who">
        <span class="name">__AUTHOR__</span>
        <span class="meta">Local Guide · __DATE__</span>
      </div>
    </div>
    <div class="stars">
      <svg viewBox="0 0 24 24" fill="#FBBC05"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#FBBC05"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#FBBC05"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#FBBC05"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#FBBC05"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
    </div>
    <div class="review">__REVIEW__</div>
    <div class="place">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5A2.5 2.5 0 1112 6.5a2.5 2.5 0 010 5z"/></svg>
      PP Travel Infinite · Agência de viagens
    </div>
  </div>
  <div class="handle">@pptravelinfinite</div>
</body>
</html>
